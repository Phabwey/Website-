<main>

<section class="register-container">

    <h2>Create Your Account</h2>

    <p>Join CollaborateX to collaborate with students and lecturers.</p>

    <form>

        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your full name" required><br><br>

        <label>Email Address</label><br>
        <input type="email" placeholder="Enter your email" required><br><br>

        <label>Student Number</label><br>
        <input type="text" placeholder="Enter your student number"><br><br>

        <label>Password</label><br>
        <input type="password" placeholder="Create a password" required><br><br>

        <label>Confirm Password</label><br>
        <input type="password" placeholder="Confirm your password" required><br><br>

        <button type="submit">Register</button>

    </form>

    <br>

    <p>Already have an account?
        <a href="login.html">Login Here</a>
    </p>

</section>
